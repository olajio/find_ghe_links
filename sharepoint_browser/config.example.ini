# Copy this file to config.ini and adjust as needed.
# config.ini is gitignored so your settings stay local.

[sharepoint]
# The SharePoint Online hostname (tenant).
hostname = hedgeservcorp.sharepoint.com
# Server-relative path of the target site/subsite (the part after the hostname).
site_path = /sites/GlobalTechnology/MonitoringAndAnalytics
# Set to true to also crawl every subsite beneath site_path. Point site_path at
# the parent (e.g. /sites/GlobalTechnology) with this on to sweep the whole tree.
# Can also be toggled per-run with --recursive.
recurse_subsites = false

[search]
# The string to hunt for. Matched case-insensitively; the FULL URL (domain plus
# the URI path after it) is captured, not just the domain.
needle = ghe.hedgeserv.net

[browser]
# How long (seconds) to wait for you to finish signing in before giving up.
login_timeout = 300
# Use an already-installed browser instead of Playwright's bundled Chromium.
# Leave blank to use bundled Chromium (requires 'playwright install chromium').
# Set to 'chrome' or 'msedge' to use your installed Google Chrome / Microsoft
# Edge instead — this avoids the browser download entirely, which is the easiest
# fix when a corporate proxy blocks 'playwright install' with a TLS/cert error.
channel =

[documents]
# Scan documents (.docx/.xlsx/.pdf and legacy .doc/.xls/.ppt) in addition to pages.
enabled = true
# Skip files larger than this (MB).
max_file_mb = 25

[output]
csv_path = ghe_links_report.csv
xlsx_path = ghe_links_report.xlsx
