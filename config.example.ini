# Copy this file to config.ini and adjust as needed.
# config.ini is gitignored so your settings stay local.

[sharepoint]
# The SharePoint Online hostname (tenant).
hostname = hedgeservcorp.sharepoint.com
# Server-relative path of the target site/subsite. This is the part of the URL
# after the hostname. Scoped to just this subsite by default.
site_path = /sites/GlobalTechnology/MonitoringAndAnalytics
# Set to true to also crawl every subsite beneath site_path. Point site_path at
# the parent (e.g. /sites/GlobalTechnology) with this enabled to sweep the whole
# tree. Can also be toggled per-run with the --recursive flag.
recurse_subsites = false

[search]
# The string to hunt for. Matched case-insensitively in link targets and text.
needle = ghe.hedgeserv.net

[auth]
# Azure AD tenant for the login authority. "organizations" works for any
# work/school account; you can also put the tenant domain
# (e.g. hedgeservcorp.onmicrosoft.com) or the tenant GUID.
authority_tenant = organizations
# Public client used for the device-code flow. This is Microsoft's first-party
# "Microsoft Graph Command Line Tools" app, which supports device-code login
# with delegated permissions, so no custom app registration is required.
client_id = 14d82eec-204b-4c2f-b7e8-296a70dab67e

[documents]
# Whether to scan documents in addition to pages. Covers .docx/.xlsx/.pdf and
# legacy .doc/.xls/.ppt.
enabled = true
# Skip files larger than this (MB) to avoid downloading huge blobs.
max_file_mb = 25

[output]
csv_path = ghe_links_report.csv
xlsx_path = ghe_links_report.xlsx
